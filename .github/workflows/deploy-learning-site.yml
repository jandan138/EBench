name: Deploy Learning Site

# EBench 交互式教程是零构建的 static HTML（learn/），
# 直接把 learn/ 作为 Pages artifact 上传，无需 Node/构建。
# 部署地址: https://jandan138.github.io/EBench/

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-learning-site.yml
      - learn/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify Foundations source contracts
        run: |
          node --test learn/tests/activation-gates-viz.test.mjs learn/tests/foundations-navigation-integrity.test.mjs learn/tests/f-2-25-multi-head-content.test.mjs learn/tests/f-2-5-mlp-basics-content.test.mjs learn/tests/f-2-5-mlp-basics-math.test.mjs learn/tests/f-3-transformer-block-content.test.mjs
          node --check learn/assets/js/widgets/activation-gates-viz.js

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload learn/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: learn

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
